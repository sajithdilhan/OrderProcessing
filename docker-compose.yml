services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  oms.api:
    container_name: oms-api
    build:
      context: .
      dockerfile: ./src/Oms.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5001:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy

  inventory.service.api:
    container_name: inventory-service-api
    build:
      context: .
      dockerfile: ./src/Inventory.Service.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5003:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy

  order.orchestrator.api:
    container_name: order-orchestrator-api
    build:
      context: .
      dockerfile: ./src/Order.Orchestrator.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Services__OmsBaseUrl: http://oms.api:8080
      Services__InventoryBaseUrl: http://inventory.service.api:8080
      RabbitMq__Host: rabbitmq
      RabbitMq__VirtualHost: /
      RabbitMq__Username: guest
      RabbitMq__Password: guest
    ports:
      - "5002:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      oms.api:
        condition: service_started
      inventory.service.api:
        condition: service_started

  payment.gateway.api:
    container_name: payment-gateway-api
    build:
      context: .
      dockerfile: ./src/Payment.Gateway.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      RabbitMq__Host: rabbitmq
      RabbitMq__VirtualHost: /
      RabbitMq__Username: guest
      RabbitMq__Password: guest
    ports:
      - "5004:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      order.orchestrator.api:
        condition: service_started